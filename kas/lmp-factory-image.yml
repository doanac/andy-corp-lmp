# Generated by manifest2kas.py - do not hand-edit blindly.
header:
  version: 14

distro: "lmp"
machine: "intel-corei7-64"
target: "lmp-factory-image"

env:
  # Directory holding this factory's signing keys (factory-keys).
  # Keys vendored inside the layer. The patched lmp-factory-custom.inc
  # auto-detects <layer>/factory-keys, so no value is required here, but
  # you may still override FACTORY_KEYS_DIR from the environment.
  FACTORY_KEYS_DIR:
  # H_BUILD: set in the environment on every build (pass-through, no default).
  H_BUILD:

